<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>

    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de Alunos</h1>

        <form action="/cadastrar" method="post">

            <div class="grupo-form">
                <label for="nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" placeholder="Digite o nome do aluno">
            </div>

            <div class="grupo-form">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" placeholder="Digite o e-mail">
            </div>

            <div class="grupo-form">
                <label for="matricula">Matrícula</label>
                <input type="text" name="matricula" id="matricula" placeholder="Digite a matrícula">
            </div>

            <div class="grupo-form">
                <label for="curso">Curso</label>
                <input type="text" name="curso" id="curso" placeholder="Digite o curso">
            </div>

            <div class="grupo-form">
                <label for="data">Data de Nascimento</label>
                <input type="date" name="data" id="data">
            </div>

            <button type="submit">Cadastrar</button>

        </form>

    </div>

</body>
</html>
